name: 每日自动任务
on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点（北京时间8点）
  workflow_dispatch:    # 手动触发

jobs:
  auto-run:
    runs-on: ubuntu-latest  # 运行环境：GitHub托管Ubuntu最新版
    steps:
      # 1. 检出仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置Python环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖（如有）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 运行你的自动脚本（比如scripts/auto.py）
      - name: Run automation script
        run: python scripts/auto.py
        env:
          # 敏感信息（Token/密钥）从GitHub Secrets读取，不暴露日志
          API_TOKEN: ${{ secrets.API_TOKEN }}
